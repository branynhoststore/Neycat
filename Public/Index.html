<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeyChat — AI Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --gold-dim: #b89900;
    --bg: #0a0a0f;
    --surface2: #1a1a26;
    --border: rgba(255,215,0,0.15);
    --text: #f0f0f0;
    --muted: #888;
    --user-bubble: linear-gradient(135deg, #FFD700, #ff9f00);
    --bot-bubble: #1a1a26;
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(255,215,0,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 80% 90%, rgba(255,160,0,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  header {
    position: relative; z-index: 10;
    display: flex; align-items: center; gap: 14px;
    padding: 16px 24px;
    background: rgba(17,17,24,0.9);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
  }
  .avatar {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--user-bubble);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.35); }
    50% { box-shadow: 0 0 35px rgba(255,215,0,0.65); }
  }
  .header-info h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 2px;
    color: var(--gold); line-height: 1;
  }
  .status {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted); margin-top: 2px;
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%; background: #4ade80;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }
  .header-badge {
    margin-left: auto;
    background: rgba(255,215,0,0.1);
    border: 1px solid var(--border);
    color: var(--gold);
    font-size: 11px; font-weight: 600; letter-spacing: 1px;
    padding: 4px 10px; border-radius: 20px; text-transform: uppercase;
  }
  #chat {
    flex: 1; overflow-y: auto;
    padding: 24px 20px;
    display: flex; flex-direction: column; gap: 16px;
    position: relative; z-index: 1;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .msg-row {
    display: flex; align-items: flex-end; gap: 10px;
    animation: slide-up 0.3s ease forwards; opacity: 0;
  }
  @keyframes slide-up {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-row.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0; margin-bottom: 4px;
  }
  .msg-avatar.bot { background: var(--surface2); border: 1px solid var(--border); }
  .msg-avatar.user { background: var(--user-bubble); }
  .bubble {
    max-width: min(75%, 480px);
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.6; font-size: 14.5px;
  }
  .bubble.bot {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 6px;
    color: var(--text);
  }
  .bubble.user {
    background: var(--user-bubble);
    border-bottom-right-radius: 6px;
    color: #111; font-weight: 500;
  }
  .bubble-meta {
    font-size: 11px; color: var(--muted);
    margin-top: 4px; padding: 0 4px;
  }
  .msg-row.user .bubble-meta { text-align: right; }
  .typing-indicator {
    display: flex; gap: 5px;
    padding: 14px 18px;
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 6px;
    width: fit-content;
  }
  .typing-dot {
    width: 7px; height: 7px;
    border-radius: 50%; background: var(--gold);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }
  .welcome-card {
    text-align: center; padding: 32px 20px; margin: auto 0;
  }
  .welcome-icon {
    font-size: 52px; margin-bottom: 16px; display: block;
    filter: drop-shadow(0 0 20px rgba(255,215,0,0.4));
  }
  .welcome-card h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px; letter-spacing: 3px;
    color: var(--gold); margin-bottom: 8px;
  }
  .welcome-card p {
    color: var(--muted); font-size: 14px;
    margin-bottom: 24px; line-height: 1.6;
  }
  .suggestions {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  }
  .suggestion-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--gold-dim);
    padding: 8px 14px; border-radius: 20px;
    font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .suggestion-chip:hover {
    background: rgba(255,215,0,0.12);
    border-color: var(--gold); color: var(--gold);
    transform: translateY(-1px);
  }
  .input-area {
    position: relative; z-index: 10;
    padding: 14px 16px;
    background: rgba(17,17,24,0.95);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(12px);
  }
  .input-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 6px 6px 6px 18px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-row:focus-within {
    border-color: rgba(255,215,0,0.45);
    box-shadow: 0 0 0 3px rgba(255,215,0,0.08);
  }
  #user-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px; resize: none;
    max-height: 120px; line-height: 1.5;
  }
  #user-input::placeholder { color: var(--muted); }
  #send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--user-bubble);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 2px 12px rgba(255,215,0,0.3);
  }
  #send-btn:hover { transform: scale(1.08); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  #send-btn svg { width: 18px; height: 18px; fill: #111; }
  .input-hint { text-align: center; font-size: 11px; color: #555; margin-top: 8px; }
</style>
</head>
<body>
<header>
  <div class="avatar">⚽</div>
  <div class="header-info">
    <h1>NeyChat AI</h1>
    <div class="status">
      <span class="status-dot"></span>
      <span>Online & siap ngobrol</span>
    </div>
  </div>
  <div class="header-badge">AI Powered</div>
</header>

<div id="chat">
  <div class="welcome-card" id="welcome">
    <span class="welcome-icon">🌟</span>
    <h2>Halo, Aku NeyChat!</h2>
    <p>Chatbot AI yang siap bantu kamu dengan apapun.<br>Mulai percakapan atau pilih topik di bawah ini.</p>
    <div class="suggestions">
      <button class="suggestion-chip" onclick="suggest(this)">Hei, apa kabar?</button>
      <button class="suggestion-chip" onclick="suggest(this)">Ceritain tentang dirimu</button>
      <button class="suggestion-chip" onclick="suggest(this)">Bantu aku buat caption Instagram</button>
      <button class="suggestion-chip" onclick="suggest(this)">Rekomendasiin film seru</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="Ketik pesanmu di sini..." maxlength="2000"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Kirim">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="input-hint">Tekan Enter untuk kirim · Shift+Enter untuk baris baru</div>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const API_URL = '/chat';
  let messages = [];
  let isLoading = false;

  function getTime() {
    return new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
  }

  function appendMessage(role, text) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    const avatarDiv = document.createElement('div');
    avatarDiv.className = `msg-avatar ${role}`;
    avatarDiv.textContent = role === 'bot' ? '⚽' : '🙂';
    const col = document.createElement('div');
    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.innerHTML = text.replace(/\n/g, '<br>');
    const meta = document.createElement('div');
    meta.className = 'bubble-meta';
    meta.textContent = getTime();
    col.appendChild(bubble);
    col.appendChild(meta);
    row.appendChild(avatarDiv);
    row.appendChild(col);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typing-row';
    const avatarDiv = document.createElement('div');
    avatarDiv.className = 'msg-avatar bot';
    avatarDiv.textContent = '⚽';
    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
    row.appendChild(avatarDiv);
    row.appendChild(indicator);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-row');
    if (el) el.remove();
  }

  function suggest(btn) {
    input.value = btn.textContent;
    sendMessage();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isLoading) return;
    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    sendBtn.disabled = true;
    messages.push({ role: 'user', content: text });
    appendMessage('user', text);
    showTyping();
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages })
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error);
      messages.push({ role: 'assistant', content: data.reply });
      removeTyping();
      appendMessage('bot', data.reply);
    } catch (err) {
      removeTyping();
      appendMessage('bot', '😅 Gagal konek ke server. Coba lagi ya!');
    }
    isLoading = false;
    sendBtn.disabled = false;
    input.focus();
  }

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>
</body>
        </html>
